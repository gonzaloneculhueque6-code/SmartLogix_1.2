spring.application.name=demo

# Configuración del Servidor
server.port=8081

# Conexión a Base de Datos (PostgreSQL en Docker)
spring.datasource.url=jdbc:postgresql://localhost:5433/inventory_db
spring.datasource.username=admin
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de Kafka - PRODUCTOR
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Configuración de Kafka - CONSUMIDOR (Para descontar stock)
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# HikariCP

# Número mínimo de conexiones inactivas en el pool (ajusta según tu tráfico)
spring.datasource.hikari.minimum-idle=5
# Tiempo máximo que Spring esperará por una conexión antes de dar error (30s es mucho, bajamos a 10s)
spring.datasource.hikari.connection-timeout=10000
# Tiempo máximo que una conexión puede estar inactiva en el pool
spring.datasource.hikari.idle-timeout=600000
# Vida máxima de una conexión (evita conexiones "zombis")
spring.datasource.hikari.max-lifetime=1800000
# Número máximo de conexiones abiertas (ajusta según tu tráfico)
spring.datasource.hikari.maximum-pool-size=20

# Circuit Breaker: Abre el circuito si el 50% de las grabaciones fallan
resilience4j.circuitbreaker.instances.dbProductos.slidingWindowSize=6
resilience4j.circuitbreaker.instances.dbProductos.failureRateThreshold=50
resilience4j.circuitbreaker.instances.dbProductos.waitDurationInOpenState=20s
resilience4j.circuitbreaker.instances.dbProductos.registerHealthIndicator=true

# Retry: Reintenta 3 veces si la base de datos no responde (PostgreSQL Down)
resilience4j.retry.instances.dbProductos.maxAttempts=3
resilience4j.retry.instances.dbProductos.waitDuration=1s